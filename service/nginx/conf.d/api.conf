# api.linclean.kr — TLS 종단 + Spring(backend:8080) 리버스 프록시
# ai(FastAPI)는 외부 비노출: 여기서 프록시하지 않음 (Spring 내부 호출만 사용)

# Rate limiting zones (http context)
# api: 일반 API 요청 — IP당 10r/s, burst 20까지 허용
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# 80: ACME 챌린지 처리 + 나머지는 443으로 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name api.linclean.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 443: TLS 종단 후 backend로 프록시
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.linclean.kr;

    ssl_certificate     /etc/letsencrypt/live/api.linclean.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.linclean.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 10m;

    # 일반 요청 rate limiting
    limit_req zone=api burst=20 nodelay;
    limit_req_status 429;

    # 알려진 스캔/공격 경로 차단 (defense-in-depth)
    location ~* ^/(swagger-ui|swagger-resources|v3/api-docs|webjars|actuator|admin|console|env|metrics) {
        return 404;
    }

    # 자동화 스캐너가 주로 노리는 경로 — 응답 없이 연결 끊기
    location ~* ^/\.(env|git|aws|ssh) {
        return 444;
    }
    location ~* ^/(wp-admin|wp-login|phpmyadmin|\.well-known/security\.txt) {
        return 444;
    }

    location / {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
