x-common: &common
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - linclean-network
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  backend:
    <<: *common
    image: ${DOCKER_USERNAME}/linclean-backend:${DOCKER_IMAGE_TAG:-latest}
    container_name: linclean-spring
    # 호스트 publish 없이 내부 네트워크로만 노출 (nginx가 backend:8080으로 프록시)
    expose:
      - "${API_PORT}"
    environment:
      - TZ=Asia/Seoul
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseContainerSupport
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${API_PORT}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    volumes:
      - ./logs/backend:/app/logs

  ai:
    <<: *common
    image: ${DOCKER_USERNAME}/linclean-ai:${DOCKER_IMAGE_TAG:-latest}
    container_name: linclean-ai
    # 외부 비노출 — 내부 네트워크로만 (Spring이 ai:8000으로 호출)
    expose:
      - "${FAST_PORT}"
    environment:
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:${FAST_PORT}/api/v1/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./logs/ai:/app/logs
      - ai_data:/app/data

  nginx:
    image: nginx:1.27-alpine
    container_name: linclean-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
      - ./logs/nginx:/var/log/nginx
    networks:
      - linclean-network
    # 6시간마다 reload해서 갱신된 인증서 반영
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    container_name: linclean-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # 12시간마다 갱신 시도 (실제 갱신은 만료 30일 이내에만 일어남)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"

networks:
  linclean-network:
    driver: bridge

volumes:
  ai_data:
  certbot_certs:
  certbot_www:
